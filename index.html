<!doctype html>
<html lang="en">
  <head>
    <script>
      // Aggressively suppress environment-related errors from browser extensions (e.g., MetaMask)
      (function() {
        const suppressKeywords = [
          'ethereum', 'metamask', 'web3', 'wallet', 'proxy', 'getter', 
          'property descriptor', 'accessors', 'invalid property descriptor',
          'cannot set property ethereum', 'failed to assign ethereum proxy',
          'uncaught typeerror', 'specify accessors', 'value or writable attribute',
          'failed to connect to metamask', 'script error.'
        ];
        
        const shouldSuppress = (args) => {
          const message = args.map(arg => {
            try {
              if (typeof arg === 'string') return arg;
              if (arg instanceof Error) return arg.message + ' ' + arg.stack;
              if (typeof arg === 'object' && arg !== null) {
                return (arg.message || arg.name || '') + ' ' + JSON.stringify(arg);
              }
              return String(arg);
            } catch (e) { return String(arg); }
          }).join(' ').toLowerCase();
          
          return suppressKeywords.some(keyword => message.includes(keyword));
        };

        const consoleMethods = ['error', 'warn', 'log', 'info', 'debug', 'trace', 'dir'];
        consoleMethods.forEach(method => {
          const original = console[method];
          try {
            console[method] = (...args) => {
              if (shouldSuppress(args)) return;
              original.apply(console, args);
            };
          } catch (e) {}
        });

        const handleError = (event) => {
          const message = (event.message || (event.reason && (event.reason.message || event.reason.toString())) || '').toLowerCase();
          if (suppressKeywords.some(k => message.includes(k))) {
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            return true;
          }
        };
        window.addEventListener('error', handleError, true);
        window.addEventListener('unhandledrejection', handleError, true);

        const originalDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          const propStr = String(prop).toLowerCase();
          const isWeb3Related = propStr.includes('ethereum') || propStr.includes('web3') || propStr.includes('metamask');
          try {
            if (descriptor && (descriptor.get || descriptor.set) && ('value' in descriptor || 'writable' in descriptor)) {
              const fixedDescriptor = Object.assign({}, descriptor);
              delete fixedDescriptor.value;
              delete fixedDescriptor.writable;
              return originalDefineProperty.call(this, obj, prop, fixedDescriptor);
            }
            return originalDefineProperty.call(this, obj, prop, descriptor);
          } catch (e) {
            if (isWeb3Related || suppressKeywords.some(k => (e.message || '').toLowerCase().includes(k))) return obj;
            throw e;
          }
        };

        // Override XHR to block extension calls
        const originalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new originalXHR();
          const originalOpen = xhr.open;
          xhr.open = function(method, url) {
            if (typeof url === 'string' && suppressKeywords.some(k => url.toLowerCase().includes(k))) {
              this.send = function() { console.debug('Blocked extension XHR'); };
              return;
            }
            return originalOpen.apply(this, arguments);
          };
          return xhr;
        };

        const originalFetch = window.fetch;
        try {
          window.fetch = function(input, init) {
            const url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
            if (typeof url === 'string' && suppressKeywords.some(k => url.toLowerCase().includes(k))) {
              return Promise.reject(new Error('Suppressed extension fetch'));
            }
            return originalFetch.apply(this, arguments);
          };
        } catch (e) {}

        const originalAlert = window.alert;
        try {
          window.alert = function(msg) {
            if (typeof msg === 'string' && suppressKeywords.some(k => msg.toLowerCase().includes(k))) return;
            return originalAlert.apply(this, arguments);
          };
        } catch (e) {}

        const originalOpen = window.open;
        try {
          window.open = function(url) {
            if (typeof url === 'string' && suppressKeywords.some(k => url.toLowerCase().includes(k))) return null;
            return originalOpen.apply(this, arguments);
          };
        } catch (e) {}

        try {
          const noop = () => {};
          const dummyEth = {
            isMetaMask: true,
            request: async () => null,
            on: noop,
            removeListener: noop,
            send: noop,
            enable: async () => [],
            isConnected: () => false,
            selectedAddress: null,
            networkVersion: null,
            chainId: null
          };
          let eth = dummyEth;
          originalDefineProperty(window, 'ethereum', {
            get() { return eth; },
            set(val) { eth = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
